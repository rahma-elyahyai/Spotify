spring.application.name=project-Music-Streaming-System-New

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:MusicSystemDB2}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Root1234!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:TON_EMAIL_GMAIL}
spring.mail.password=${MAIL_PASSWORD:TON_MOT_DE_PASSE_APPLICATION}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.enabled=true
spring-boot.run.jvmArguments=-Xms2g -Xmx6g
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=2

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,application/json,image/*

logging.file.name=Melodify.log
