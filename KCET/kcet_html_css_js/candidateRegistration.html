<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>
        .heading {
            display: flex;
            flex-direction: row;
            gap: 230px;
            align-items: center;
            margin: 5px;
        }
    </style>
</head>

<body>
    <div class="heading">
        <div id="logo">
            <img src="Screenshot 2024-10-07 140733.png" class="img-fluid">
        </div>

        <h1>Candidate Registration</h1>

        <div id="logo1">
            <img src="Screenshot 2024-10-07 171237.png" class="img-fluid">
        </div>
    </div>
    <form class="row g-3">
        <div class="col-md-3">
            <label for="validationDefault01" class="form-label">First name</label>
            <input type="text" class="form-control" id="validationDefault01" placeholder="enter your First name"
                required>
        </div>
        <div class="col-md-3">
            <label for="validationDefault02" class="form-label">Last name</label>
            <input type="text" class="form-control" id="validationDefault02" placeholder="enter your Last name"
                required>
        </div>
        <div class="col-md-3">
            <label for="validationDefaultUsername" class="form-label">Username</label>
            <div class="input-group">
                <input type="text" class="form-control" id="Username" placeholder="enter username"
                    aria-describedby="inputGroupPrepend2" required>
            </div>
        </div>
        <div class="col-md-3">
            <label for="validationDefaultUsername" class="form-label">Password</label>
            <div class="input-group">
                <input type="text" class="form-control" id="password" placeholder="enter password"
                    aria-describedby="inputGroupPrepend2" required>
            </div>
        </div>
        <div class="col-md-6">
            <label for="validationDefault03" class="form-label">City</label>
            <input type="text" class="form-control" id="validationDefault03" placeholder="enter your City name"
                required>
        </div>
        <div class="col-md-3">
            <label for="validationDefault04" class="form-label">State</label>
            <select class="form-select" id="validationDefault04" required>
                <option selected disabled value="">Choose...</option>
                <option>Andhra Pradesh</option>
                <option>Karnataka</option>
                <option>Kerala</option>
                <option>Tamil Nadu</option>
            </select>
        </div>
        <div class="col-md-3">
            <label for="validationDefault05" class="form-label">Pin Code</label>
            <input type="text" class="form-control" id="validationDefault05" placeholder="enter your Pin Code" required>
        </div>

        <div class="col-md-6">
            <label for="validationDefault03" class="form-label">College</label>
            <input type="text" class="form-control" id="validationDefault03" placeholder="enter your College name"
                required>
        </div>

        <div class="col-md-3">
            <label for="validationDefault05" class="form-label">branch</label>
            <select class="form-select" id="validationDefault04" placeholder="enter your branch" required>
                <option selected disabled value="">Choose...</option>
                <option>PCMB</option>
                <option>PCMC</option>
                <option>PCME</option>
              
            </select>
        </div>

        <div class="col-md-3">
            <label for="validationDefault05" class="form-label">Year of passing</label>
            <input type="text" class="form-control" id="validationDefault05" placeholder="Enter your year of passing">
        </div>



        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="invalidCheck2" required>
                <label class="form-check-label" for="invalidCheck2">
                    Agree to terms and conditions
                </label>
            </div>
        </div>
        <div class="col-12">
            <button class="btn btn-primary" type="submit" onclick="submitt()">Submit form</button>
            
            <button type="button" class="btn btn-link" onclick="home()">Home</button>
        </div>
    

    </form>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
<script src="LoginRegistration_js.js"></script>

</html>
