<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Document</title>
    <style>
        body{
           
            background-color: #e35252;
            padding: 10px;

        }
        #question{
            font-size: 50px;
        }
        #options{
            font-size:30px;
        }
    </style>
    
       
</head>

<body>
    <form>
        <div id="question">
            
                1. Who is the highest run-scorer for RCB in IPL history?
            
        </div>
        <br><br>
        <div id="options">
            <ol>
                
                <input class="form-check-input" type="radio" name="flexRadioDefault" value='1'id="flexRadioDefault1">
                <label class="form-check-label" for="flexRadioDefault1" id="option1">
                  Chris Gayle
                </label>
                 
                 
                <input class="form-check-input" type="radio" name="flexRadioDefault" value='2' id="flexRadioDefault2">
                <label class="form-check-label" for="flexRadioDefault1" id="option2">
                  AB de Villiers
                </label>
                 
                 
                <input class="form-check-input" type="radio" name="flexRadioDefault" value='3'id="flexRadioDefault3">
                <label class="form-check-label" for="flexRadioDefault1" id="option3">
                 Virat Kohli
                </label>
               
                <input class="form-check-input" type="radio" name="flexRadioDefault" value='4' id="flexRadioDefault4">
                <label class="form-check-label" for="flexRadioDefault1" id="option4">
                Rahul Dravid
                </label>
            </ol>

        </div>
        <br><br>
        <div id="submit"><button type="button" class="btn btn-dark" onclick="check()">Next</button></div>
    </form>
   
</body>

</html>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
