<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<style>
    .heading {
        display: flex;
        flex-direction: row;
        gap: 230px;
        align-items: center;
        margin: 5px;
        justify-content: space-around;
    }
    .login
    {
        height: 400px;
        width: 400px;
        position:absolute;
        left:35%;
        top:30%;

    }
</style>
</head>
<body>
    <div class="heading">
        <div id="logo">
            <img src="Screenshot 2024-10-07 140733.png" class="img-fluid">
        </div>

        <h1>CET-2024 Results</h1>

        <div id="logo1">
            <img src="Screenshot 2024-10-07 171237.png" class="img-fluid">
        </div>
    </div>
    <div class="login">
        <form  class="was-validated">
          
            <div class="mb-3 mt-3">
              <label for="uname" class="form-label">Cet No:</label>
              <input type="text" class="form-control" id="uname" placeholder="Enter Cet Number" name="uname" required>
              <div class="valid-feedback">Valid.</div>
              <div class="invalid-feedback">Please fill out this field.</div>
            </div>
        
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="myCheck" name="remember" required>
              <label class="form-check-label" for="myCheck">I agree to terms and conditions.</label>
              <div class="valid-feedback">Valid.</div>
              <div class="invalid-feedback">Check this checkbox to continue.</div>
            </div>
            
       
          </form>
          <a href="resultDeclaration.html"><button type="submit" class="btn btn-primary">Submit</button></a>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
    <!-- <script src="candidateRegistration_js.js"></script> -->
</html>
