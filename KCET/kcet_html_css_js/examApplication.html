<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kcet application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>
        body {
            margin: 0px;
            padding: 0px;
        }

        .heading {
            background-color: #730573d1;
            height: 100px;
            color: white;
            display: flex;
            flex-direction: row;
            align-items: center;

        }
    </style>

</head>

<body>
    <div class="main p-3 m-5">
        <div class="heading">
            <h2 class="text-center">
                UGCET Application Form</h2>
        </div>
        <br><br>
        <form class="row g-3">
            <div class="col-md-4">
                <label for="validationDefault01" class="form-label">First name</label>
                <input type="text" class="form-control" id="validationDefault01" value="" required>
            </div>
            <div class="col-md-4">
                <label for="validationDefault02" class="form-label">Last name</label>
                <input type="text" class="form-control" id="validationDefault02" value="" required>
            </div>
            <div class="col-md-4">
                <label for="validationDefaultUsername" class="form-label">Email</label>
                <div class="input-group">
                    <input type="email" class="form-control" id="email" aria-describedby="inputGroupPrepend2" required>
                </div>
            </div>
            <div class="col-12">
                <label for="inputAddress" class="form-label">Address</label>
                <input type="text" class="form-control" id="inputAddress" placeholder="Your current address">
            </div>
            <div class="col-md-6">
                <label for="validationDefault03" class="form-label">City</label>
                <input type="text" class="form-control" id="validationDefault03" required>
            </div>
            <div class="col-md-3">
                <label for="validationDefault04" class="form-label">State</label>
                <select class="form-select" id="validationDefault04" required>
                    <option>Karnataka</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="validationDefault05" class="form-label">Zip</label>
                <input type="text" class="form-control" id="validationDefault05" required>
            </div>
            <div class="col-3">
                <label for="inputAddress" class="form-label">Phone Number</label>
                <input type="text" class="form-control" id="inputPhone" placeholder="Your Phone Number">
            </div>
            <div class="col-md-4">
                <label for="validationDefault04" class="form-label">Category</label>
                <select class="form-select" id="validationDefault04" required>
                    <option>General</option>
                    <option>OBC</option>
                    <option>SC</option>
                    <option>ST</option>
                </select>
            </div>
            <div class="col-4">
                <label for="inputAddress" class="form-label">Aadhar Number</label>
                <input type="text" class="form-control" id="inputPhone" placeholder="Your aadhar Number">
            </div>
            <div class="input-group mb-3">
                <label for="inputPassword3" class="col-form-label">Upload your Goverment ID</label>
                <input type="file" class="form-control m-2" id="inputGroupFile02">
                <label class="input-group-text" for="inputGroupFile02">Upload</label>
            </div>
            <div class="input-group mb-3">
                <label for="inputPassword3" class="col-form-label">Upload your Passport Sized Photo</label>
                <input type="file" class="form-control m-2" id="inputGroupFile02">
                <label class="input-group-text" for="inputGroupFile02">Upload</label>
            </div>
            <div class="input-group mb-3">
                <label for="inputPassword3" class="col-form-label">Upload your 10th Marks card</label>
                <input type="file" class="form-control m-2" id="inputGroupFile02">
                <label class="input-group-text" for="inputGroupFile02">Upload</label>
            </div>
            <div class="input-group mb-3">
                <label for="inputPassword3" class="col-form-label">Upload your 12th Marks card</label>
                <input type="file" class="form-control m-2" id="inputGroupFile02">
                <label class="input-group-text" for="inputGroupFile02">Upload</label>
            </div>
            <div class="col-md-4" id="marks">
                <label for="validationDefault04" class="form-label">Physics marks:</label>
                <input type="text" class="form-control" id="validationDefault05" required>
                <label for="validationDefault04" class="form-label">Chemistry marks:</label>
                <input type="text" class="form-control" id="validationDefault05" required>
                <label for="validationDefault04" class="form-label">Maths marks:</label>
                <input type="text" class="form-control" id="validationDefault05" required>

            </div>
            <div class="col-12">
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
                    Save and submit
                </button>
                <a href="candidateLoginSucces.html "><button type="button" class="btn btn-link">
                        Back
                    </button></a>
            </div>



            <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
                aria-labelledby="staticBackdropLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="staticBackdropLabel">Alert</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            Ensure all the details are correct
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                                Proceed to payment
                              </button>
                             
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h1 class="modal-title fs-5" id="exampleModalLabel">Payment</h1>
                      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/QR_code_for_mobile_English_Wikipedia.svg/800px-QR_code_for_mobile_English_Wikipedia.svg.png" height="100" width="100">
                    </div>
                    <div class="modal-footer">
                      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>

                    </div>
                  </div>
                </div>
              </div>
        </form>
       
    </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

</html>
